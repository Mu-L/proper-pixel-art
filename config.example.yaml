# Example pixelate configuration. Every key is optional and shown here at its
# default. See proper_pixel_art/config.py for what each parameter does.
#
#   PixelateConfig.from_yaml("config.yaml")   # from Python
#   ppa input.png --config config.yaml        # from the CLI (flags override)

num_colors: 0
initial_upscale_factor: 2
scale_result: 1
transparent_background: false
pixel_width: 0

mesh:
  crop_border_pixels: 2
  canny_thresholds: [50, 200]
  closure_kernel_size: 8
  cluster_threshold: 4
  angle_threshold_deg: 15
  trim_outlier_fraction: 0.2
  hough:
    rho: 1.0
    theta_deg: 1.0
    threshold: 100
    min_line_len: 50
    max_line_gap: 10

colors:
  alpha_threshold: 128
  transparency_majority_fraction: 0.5
  quantize_method: MAXCOVERAGE  # MAXCOVERAGE, FASTOCTREE, MEDIANCUT, LIBIMAGEQUANT
  bin_size: 52
  top_colors_limit: 8
  thumbnail_size: [160, 160]
  background_candidates: null
